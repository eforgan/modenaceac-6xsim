# ══════════════════════════════════════════════════════════════════════════════
# MODENACEAC 6XSIM Backend — CD Pipeline
# Ejecuta solo en push a main (después de merge de PR)
# Jobs: build Docker image → push a registry → deploy al servidor
# ══════════════════════════════════════════════════════════════════════════════
name: CD — Deploy

on:
  push:
    branches: [main]
    # Solo deployar si cambiaron archivos relevantes del backend
    paths:
      - 'src/**'
      - 'prisma/**'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'package*.json'
      - '.github/workflows/cd.yml'

  # Permite lanzar el deploy manualmente desde GitHub UI
  workflow_dispatch:
    inputs:
      environment:
        description: 'Entorno de deploy'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      skip_migrations:
        description: 'Omitir migraciones de base de datos'
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false  # No cancelar deploys en curso

env:
  REGISTRY:      ghcr.io
  IMAGE_NAME:    ${{ github.repository_owner }}/modenaceac-6xsim-backend
  NODE_VERSION:  '20'

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1: Build y push imagen Docker al GitHub Container Registry
  # ────────────────────────────────────────────────────────────────────────────
  docker-build-push:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    timeout-minutes: 20

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraer metadata (tags y labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag con SHA corto del commit
            type=sha,prefix=sha-,format=short
            # Tag latest en main
            type=raw,value=latest,enable={{is_default_branch}}
            # Tag semver si existe un git tag (v1.2.3)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          labels: |
            org.opencontainers.image.title=MODENACEAC 6XSIM Backend
            org.opencontainers.image.description=Sistema integral de gestión de simuladores de vuelo
            org.opencontainers.image.vendor=MODENACEAC

      - name: Build y Push imagen
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          platforms:  linux/amd64

      - name: Resumen del build
        run: |
          echo "## 🐳 Docker Image" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2: Deploy al servidor vía SSH
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy al servidor
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: docker-build-push

    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: ${{ vars.DEPLOY_URL || 'http://192.168.1.10:3000' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Verificar que los secrets necesarios están configurados
      - name: Verificar secrets de deploy
        run: |
          if [ -z "${{ secrets.DEPLOY_HOST }}" ]; then
            echo "⚠️  Secret DEPLOY_HOST no configurado"
            echo "Consultar DEPLOY_SETUP.md para instrucciones"
            exit 1
          fi
          echo "✓ Secrets de deploy verificados"

      - name: Deploy vía SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          port:     ${{ secrets.DEPLOY_PORT || 22 }}
          timeout:  120s
          script: |
            set -e
            echo "══════════════════════════════════════"
            echo " MODENACEAC 6XSIM — Deploy $(date '+%Y-%m-%d %H:%M:%S')"
            echo " Commit: ${{ github.sha }}"
            echo "══════════════════════════════════════"

            # Directorio del proyecto
            cd ${{ vars.DEPLOY_DIR || '/opt/modenaceac-6xsim' }}

            # Login al registry
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull de la nueva imagen
            echo "⬇️  Pulling nueva imagen..."
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            # Backup del .env antes de cualquier operación
            cp .env .env.backup.$(date +%Y%m%d_%H%M%S) 2>/dev/null || true

            # Correr migraciones ANTES de cambiar el container
            if [ "${{ github.event.inputs.skip_migrations }}" != "true" ]; then
              echo "🗄️  Aplicando migraciones..."
              docker compose run --rm api \
                sh -c "npx prisma migrate deploy"
              echo "✓ Migraciones completadas"
            fi

            # Recrear solo el servicio api (sin tocar postgres)
            echo "♻️  Reiniciando servicio api..."
            docker compose up -d --no-deps --force-recreate api

            # Esperar healthcheck
            echo "⏳ Esperando healthcheck..."
            for i in $(seq 1 30); do
              STATUS=$(curl -sf http://localhost:3000/health | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status',''))" 2>/dev/null || echo "")
              if [ "$STATUS" = "ok" ]; then
                echo "✅ Servicio saludable después de ${i}s"
                break
              fi
              if [ $i -eq 30 ]; then
                echo "❌ Healthcheck falló después de 30s — rollback"
                docker compose up -d --no-deps --force-recreate --pull never api
                exit 1
              fi
              sleep 1
            done

            # Limpiar imágenes viejas
            docker image prune -f --filter "label=org.opencontainers.image.title=MODENACEAC 6XSIM Backend"

            echo ""
            echo "✅ Deploy completado exitosamente"
            docker compose ps api

      - name: Notificar resultado
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            echo "## ✅ Deploy exitoso" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Deploy fallido" >> $GITHUB_STEP_SUMMARY
          fi
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Autor:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
